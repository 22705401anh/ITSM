{% extends "base.html" %}

{% block title %}Changes - ITSM Platform{% endblock %}

{% block content %}
<div class="py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h2">Changes</h1>
        <a href="/changes/create" class="btn btn-primary">
            <i class="fas fa-plus"></i> Create Change
        </a>
    </div>

    <!-- Filters -->
    <div class="card mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-3">
                    <input type="text" class="form-control" placeholder="Search changes...">
                </div>
                <div class="col-md-3">
                    <select class="form-control">
                        <option selected>All Status</option>
                        <option>New</option>
                        <option>Assessment</option>
                        <option>Approval</option>
                        <option>Scheduled</option>
                        <option>Implemented</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-control">
                        <option selected>All Type</option>
                        <option>Standard</option>
                        <option>Normal</option>
                        <option>Emergency</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-outline-primary w-100">
                        <i class="fas fa-search"></i> Filter
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Changes Table -->
    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">All Changes</h5>
        </div>
        <div class="card-body">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Type</th>
                        <th>Status</th>
                        <th>Risk</th>
                        <th>Scheduled Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="7" class="text-center text-muted py-4">
                            <i class="fas fa-inbox fa-2x mb-3 d-block"></i>
                            No changes found
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
