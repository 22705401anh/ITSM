{% extends "base.html" %}

{% block title %}Entities Administration - ITSM Platform{% endblock %}

{% block content %}
<div class="py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h2">Entities Management</h1>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addEntityModal">
            <i class="fas fa-plus"></i> Add Entity
        </button>
    </div>

    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">All Entities</h5>
        </div>
        <div class="card-body">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Type</th>
                        <th>Code</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="5" class="text-center text-muted">No entities found</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add Entity Modal -->
<div class="modal fade" id="addEntityModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add New Entity</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form hx-post="/api/entities">
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="entityName" class="form-label">Name</label>
                        <input type="text" class="form-control" id="entityName" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="entityType" class="form-label">Type</label>
                        <select class="form-control" id="entityType" name="entity_type">
                            <option value="company">Company</option>
                            <option value="branch">Branch</option>
                            <option value="department">Department</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="entityCode" class="form-label">Code</label>
                        <input type="text" class="form-control" id="entityCode" name="code">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Entity</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
