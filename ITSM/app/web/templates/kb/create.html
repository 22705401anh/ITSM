{% extends "base.html" %}

{% block title %}New KB Article - KOSTAL ITSM{% endblock %}

{% block content %}
<div class="py-4">
    <h1 class="h2">Create KB Article</h1>

    <div class="card">
        <div class="card-body">
            <form hx-post="/api/kb" hx-target="#formMessage">
                <div class="mb-3">
                    <label for="title" class="form-label">Title</label>
                    <input type="text" class="form-control" id="title" name="title" required>
                </div>

                <div class="mb-3">
                    <label for="content" class="form-label">Content</label>
                    <textarea class="form-control" id="content" name="content" rows="10" required></textarea>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="category" class="form-label">Category</label>
                            <select class="form-control" id="category" name="category">
                                <option value="faq">FAQ</option>
                                <option value="guide">Guide</option>
                                <option value="troubleshooting">Troubleshooting</option>
                                <option value="policy">Policy</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="tags" class="form-label">Tags</label>
                            <input type="text" class="form-control" id="tags" name="tags" placeholder="comma separated">
                        </div>
                    </div>
                </div>

                <div id="formMessage"></div>

                <div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Publish Article
                    </button>
                    <a href="/kb" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
