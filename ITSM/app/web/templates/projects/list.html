{% extends "base.html" %}

{% block title %}Projects - KOSTAL ITSM{% endblock %}

{% block content %}
<div class="py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h2">Projects</h1>
        <a href="/projects/create" class="btn btn-primary">
            <i class="fas fa-plus"></i> New Project
        </a>
    </div>

    <!-- Filters -->
    <div class="card mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <input type="text" class="form-control" placeholder="Search projects...">
                </div>
                <div class="col-md-4">
                    <select class="form-control">
                        <option selected>All Status</option>
                        <option>Planning</option>
                        <option>In Progress</option>
                        <option>On Hold</option>
                        <option>Completed</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <button class="btn btn-outline-primary w-100">
                        <i class="fas fa-search"></i> Filter
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Projects Kanban/List -->
    <div class="row">
        <!-- Planning Column -->
        <div class="col-md-6 mb-4">
            <div class="card">
                <div class="card-header bg-body-tertiary">
                    <h6 class="mb-0">
                        <i class="fas fa-circle text-warning"></i> Planning
                    </h6>
                </div>
                <div class="card-body">
                    <div class="card mb-2 border-left-warning">
                        <div class="card-body p-2">
                            <h6>Website Redesign</h6>
                            <small class="text-muted">Start: Jan 2025</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- In Progress Column -->
        <div class="col-md-6 mb-4">
            <div class="card">
                <div class="card-header bg-body-tertiary">
                    <h6 class="mb-0">
                        <i class="fas fa-circle text-info"></i> In Progress
                    </h6>
                </div>
                <div class="card-body">
                    <div class="card mb-2 border-left-info">
                        <div class="card-body p-2">
                            <h6>Infrastructure Upgrade</h6>
                            <small class="text-muted">Progress: 45%</small>
                            <div class="progress mt-2" style="height: 5px;">
                                <div class="progress-bar" role="progressbar" style="width: 45%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.border-left-warning {
    border-left: 4px solid #ffc107;
}
.border-left-info {
    border-left: 4px solid #0dcaf0;
}
</style>
{% endblock %}
