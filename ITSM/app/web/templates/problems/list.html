{% extends "base.html" %}

{% block title %}Problems - ITSM Platform{% endblock %}

{% block content %}
<div class="py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h2">Problems</h1>
        <a href="/problems/create" class="btn btn-primary">
            <i class="fas fa-plus"></i> Create Problem
        </a>
    </div>

    <!-- Filters -->
    <div class="card mb-4">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-3">
                    <input type="text" class="form-control" placeholder="Search problems...">
                </div>
                <div class="col-md-3">
                    <select class="form-control">
                        <option selected>All Status</option>
                        <option>New</option>
                        <option>Analysis</option>
                        <option>Known Error</option>
                        <option>Solved</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <select class="form-control">
                        <option selected>All Priority</option>
                        <option>Low</option>
                        <option>Medium</option>
                        <option>High</option>
                        <option>Critical</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-outline-primary w-100">
                        <i class="fas fa-search"></i> Filter
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Problems Table -->
    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">All Problems</h5>
        </div>
        <div class="card-body">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Status</th>
                        <th>Priority</th>
                        <th>Impact</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="7" class="text-center text-muted py-4">
                            <i class="fas fa-inbox fa-2x mb-3 d-block"></i>
                            No problems found
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
