{% extends "base.html" %}

{% block title %}Create Problem - KOSTAL ITSM{% endblock %}

{% block content %}
<div class="py-4">
    <h1 class="h2">Create Problem</h1>

    <div class="card">
        <div class="card-body">
            <form hx-post="/api/problems" hx-target="#formMessage">
                <div class="mb-3">
                    <label for="title" class="form-label">Title</label>
                    <input type="text" class="form-control" id="title" name="title" required>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="5" required></textarea>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="impact" class="form-label">Impact</label>
                            <select class="form-control" id="impact" name="impact">
                                <option value="1">Low</option>
                                <option value="2" selected>Medium</option>
                                <option value="3">High</option>
                                <option value="4">Critical</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="urgency" class="form-label">Urgency</label>
                            <select class="form-control" id="urgency" name="urgency">
                                <option value="1">Low</option>
                                <option value="2">Medium</option>
                                <option value="3" selected>High</option>
                                <option value="4">Critical</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="formMessage"></div>

                <div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Create Problem
                    </button>
                    <a href="/problems" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
