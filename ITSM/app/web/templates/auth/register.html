<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - KOSTAL ITSM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
        }
        .register-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
        }
        .register-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 10px 10px 0 0;
            text-align: center;
        }
        .register-header h2 {
            margin: 0;
            font-weight: bold;
        }
        .register-body {
            padding: 30px;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-register {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 10px;
            font-weight: bold;
        }
        .btn-register:hover {
            background: linear-gradient(135deg, #5568d3 0%, #6a3f91 100%);
            color: white;
        }
        .register-footer {
            padding: 20px 30px;
            border-top: 1px solid #eee;
            text-align: center;
        }
        .register-footer a {
            color: #667eea;
            text-decoration: none;
        }
        .register-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <i class="fas fa-user-plus fa-2x mb-2"></i>
            <h2>Create Account</h2>
            <p class="mb-0">Join KOSTAL ITSM</p>
        </div>

        <div class="register-body">
            <form id="registerForm">
                <div class="mb-3">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="fullName" name="full_name" required>
                </div>

                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                    <small class="form-text text-muted">3-100 characters</small>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                    <small class="form-text text-muted">Minimum 8 characters</small>
                </div>

                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
                </div>

                <button type="submit" class="btn btn-register w-100 text-white mb-3">
                    <i class="fas fa-user-check"></i> Create Account
                </button>
            </form>

            <div id="registerError" class="alert alert-danger d-none" role="alert"></div>
            <div id="registerSuccess" class="alert alert-success d-none" role="alert">
                Account created! <a href="/login">Login here</a>
            </div>
        </div>

        <div class="register-footer">
            <p class="mb-0">Already have an account? <a href="/login">Login here</a></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (document.getElementById('confirmPassword').value !== document.getElementById('password').value) {
                return; // The blur event handles the visual validation
            }
            
            const formData = new FormData(this);
            const payload = Object.fromEntries(formData.entries());
            
            // Remove confirmPassword from payload since backend doesn't expect it
            delete payload.confirmPassword;
            
            const btn = this.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                
                if (response.ok) {
                    document.getElementById('registerForm').classList.add('d-none');
                    document.getElementById('registerSuccess').classList.remove('d-none');
                    document.getElementById('registerError').classList.add('d-none');
                } else {
                    const result = await response.json();
                    let errorMsg = result.detail || 'Registration failed. Please try again.';
                    // Handle validation errors format
                    if (Array.isArray(result.detail)) {
                        errorMsg = result.detail.map(e => e.msg).join(', ');
                    }
                    const errorDiv = document.getElementById('registerError');
                    errorDiv.textContent = errorMsg;
                    errorDiv.classList.remove('d-none');
                }
            } catch (error) {
                const errorDiv = document.getElementById('registerError');
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-check"></i> Create Account';
            }
        });

        // Validate passwords match
        document.getElementById('confirmPassword').addEventListener('blur', function() {
            if (this.value !== document.getElementById('password').value) {
                this.setCustomValidity('Passwords do not match');
                this.classList.add('is-invalid');
            } else {
                this.setCustomValidity('');
                this.classList.remove('is-invalid');
            }
        });
    </script>
</body>
</html>
