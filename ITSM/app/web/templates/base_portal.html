<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HR Portal | KOSTAL ITSM{% endblock %}</title>

    <!-- Theme Toggle (must be in head to prevent flash) -->
    <script src="/static/js/theme.js?v=2.0"></script>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/static/css/main.css?v=4.6" rel="stylesheet">
    {% block extra_css %}{% endblock %}
    
    <style>
        /* Portal-specific styling to ensure centered focus */
        .portal-main {
            background-color: var(--bs-body-bg);
            min-height: calc(100vh - 56px);
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
    <!-- Navigation (Simplified or Standard) -->
    {% include "layout/navbar.html" %}

    <!-- Main Content (No Sidebar) -->
    <div class="portal-main">
        <main class="flex-grow-1 px-3 px-md-5 py-4 w-100">
            <!-- Breadcrumbs -->
            {% block breadcrumb %}{% endblock %}

            <!-- Page Content -->
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Footer -->
    {% include "layout/footer.html" %}

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container position-fixed bottom-0 end-0 p-3">
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="/static/js/notifications.js?v=1.3"></script>
    <script src="/static/js/app.js?v=1.2"></script>
    {% block extra_scripts %}{% endblock %}
    {% block extra_js %}{% endblock %}
</body>
</html>
